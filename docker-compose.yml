version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: smartthink_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-smartthink_dev}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartthink_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: smartthink_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartthink_network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.backend
    container_name: smartthink_backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-5000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-smartthink_dev}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      ALPACA_API_KEY: ${ALPACA_API_KEY}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY}
      POLYGON_API_KEY: ${POLYGON_API_KEY}
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules
    command: npm run dev
    networks:
      - smartthink_network

  # Frontend Application
  frontend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.frontend
    container_name: smartthink_frontend
    environment:
      REACT_APP_API_URL: http://localhost:${PORT:-5000}
      REACT_APP_WS_URL: ws://localhost:${PORT:-5000}
      REACT_APP_ENVIRONMENT: ${NODE_ENV:-development}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    command: npm start
    networks:
      - smartthink_network

  # PgAdmin (Database Management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: smartthink_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@smartthinkrich.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - smartthink_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  smartthink_network:
    driver: bridge
